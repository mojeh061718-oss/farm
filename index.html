<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#5cb14e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Harvest Empire</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="game"></canvas>

<!-- ===== Top HUD ===== -->
<div id="hud-top">
  <div class="pill" id="pill-coins"><span class="picon">🪙</span><span id="coins">0</span></div>
  <div class="pill" id="pill-level">
    <span class="lvl-badge" id="level">1</span>
    <div class="xpbar"><div id="xpfill"></div></div>
  </div>
  <div class="pill" id="pill-clock">
    <span id="season-emoji">🌸</span><span id="day-label">Day 1</span>
    <span id="weather-emoji">☀️</span>
    <div class="daybar"><div id="dayfill"></div></div>
  </div>
</div>

<!-- ===== Goal chip ===== -->
<div id="goal-chip" class="hidden">
  <span id="goal-icon">🎯</span>
  <div class="goal-text">
    <span id="goal-title">Till 4 plots</span>
    <span id="goal-progress">0 / 4</span>
  </div>
  <span id="goal-reward">+30 🪙</span>
</div>

<!-- ===== Side buttons ===== -->
<div id="side-buttons">
  <button class="round-btn" id="btn-shop" title="Shop">🏪</button>
  <button class="round-btn" id="btn-market" title="Market"><span id="market-icon">⚖️</span><span class="btn-badge hidden" id="market-badge"></span></button>
  <button class="round-btn" id="btn-orders" title="Orders">📋<span class="btn-badge hidden" id="orders-badge"></span></button>
  <button class="round-btn" id="btn-menu" title="Menu">⚙️</button>
</div>

<!-- ===== Bottom toolbar ===== -->
<div id="toolbar">
  <button class="tool-btn active" data-tool="auto" title="Smart tap">👆<label>Auto</label></button>
  <button class="tool-btn" data-tool="hoe" title="Till soil">⛏️<label>Till</label></button>
  <button class="tool-btn" data-tool="plant" title="Plant seeds">🌱<label>Plant</label></button>
  <button class="tool-btn" data-tool="water" title="Water">💧<label>Water</label><div class="water-gauge"><div id="water-fill"></div></div></button>
  <button class="tool-btn" data-tool="harvest" title="Harvest">🧺<label>Harvest</label></button>
</div>

<!-- ===== Build mode bar ===== -->
<div id="buildbar" class="hidden">
  <span id="build-label">Place the Coop</span>
  <div class="build-actions">
    <button id="build-ok" class="chunky green">✓ Place</button>
    <button id="build-cancel" class="chunky red">✕</button>
  </div>
</div>

<!-- ===== Bottom sheet (panels) ===== -->
<div id="sheet-backdrop" class="hidden"></div>
<div id="sheet" class="hidden">
  <div id="sheet-handle"></div>
  <div id="sheet-header">
    <h2 id="sheet-title">Shop</h2>
    <button id="sheet-close">✕</button>
  </div>
  <div id="sheet-tabs" class="hidden"></div>
  <div id="sheet-body"></div>
</div>

<!-- ===== Confirm modal ===== -->
<div id="modal-backdrop" class="hidden">
  <div id="modal">
    <div id="modal-icon">❓</div>
    <div id="modal-text">Are you sure?</div>
    <div id="modal-buttons">
      <button id="modal-no" class="chunky gray">Cancel</button>
      <button id="modal-yes" class="chunky green">OK</button>
    </div>
  </div>
</div>

<!-- ===== Toasts ===== -->
<div id="toasts"></div>

<!-- ===== Level up splash ===== -->
<div id="levelup" class="hidden">
  <div class="levelup-inner">
    <div class="levelup-star">⭐</div>
    <h1>Level <span id="levelup-num">2</span>!</h1>
    <div id="levelup-unlocks"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/game.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
